version: '3.9'

services:

  mosquitto:
    image: eclipse-mosquitto
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto:/mosquitto/config
    networks:
      - iot-network

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: password
      DOCKER_INFLUXDB_INIT_ORG: iot-org
      DOCKER_INFLUXDB_INIT_BUCKET: smoke-bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: supersecrettoken
    networks:
      - iot-network

  ekuiper:
    image: lfedge/ekuiper:latest
    container_name: ekuiper
    ports:
      - "9081:9081"
    networks:
      - iot-network
    environment:
      MQTT_SOURCE__DEFAULT__SERVERS__0: tcp://mosquitto:1883
      MQTT_SOURCE__DEFAULT__QOS: "1"
    volumes:
      - ./infra/ekuiper/mqtt_source.yaml:/kuiper/etc/mqtt_source.yaml
      - ./infra/ekuiper/data:/kuiper/data
      - ./infra/ekuiper/log:/kuiper/log

  analytics-service:
    build:
      context: ./src/AnalyticsService/AnalyticsService
      dockerfile: Dockerfile
    container_name: analytics-service
    depends_on:
      - mosquitto
      - influxdb
      - ekuiper
    ports:
      - "5001:8080"
    networks:
      - iot-network

  notification-service:
    build:
      context: ./src/NotificationService
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "5002:3000"
    networks:
      - iot-network

  mongo:
      image: mongo:7
      container_name: smoke-mongo
      ports:
        - "27017:27017"
      volumes:
        - smoke_mongo_data:/data/db
      networks:
        - iot-network
  dataservice:
    build:
      context: ./src/DataService
    container_name: smoke-dataservice
    environment:
      - PORT=5001
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=smoke
    depends_on:
      - mongo
    ports:
      - "5003:5001"
    networks:
      - iot-network

  gateway-service:
    build:
      context: ./src/GatewayService
      dockerfile: Dockerfile
    container_name: gateway-service
    depends_on:
      - mosquitto
      - dataservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "1883"
      MQTT_TOPIC_READINGS: iot/smoke/readings
    ports:
      - "5000:8080"
    networks:
      - iot-network

networks:
  iot-network:
    driver: bridge

volumes:
  smoke_mongo_data:
