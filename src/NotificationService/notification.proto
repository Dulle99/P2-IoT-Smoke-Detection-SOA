syntax = "proto3";

option csharp_namespace = "AnalyticsService.Protos";

package notification;

service NotificationService{
    rpc SendPM25Alert (PM25AlertRequest) returns (PM25AlertResponse);
}

message PM25AlertRequest{
    string deviceId = 1;
  double pm25 = 2;
  double temperature = 3;
  string timestampUtc = 4;
}

message PM25AlertResponse {
  string status = 1;
}
